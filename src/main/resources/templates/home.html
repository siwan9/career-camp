<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>진로특강 신청</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/home.css}">
</head>
<body>
<div th:if="${success}"
     class="alert alert-success alert-dismissible fade show success-alert">

    신청이 완료되었습니다 🎉

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>
</div>

<div class="main-container">

    <div class="notice-card text-center">

        <div class="emoji">
            🎓
        </div>

        <h1 class="title">
            2026 진로특강 신청
        </h1>

        <p class="subtitle">
            원하는 진로특강을 선택하고 신청할 수 있습니다.<br>
            신청 내역 조회도 가능합니다.
        </p>

        <div class="text-muted">
            신청기간<br>
            2026.07.01 ~ 2026.07.10
        </div>

    </div>

    <div class="menu-wrapper">

        <a href="/register"
           class="btn btn-primary menu-btn">
            특강 신청하기
        </a>

        <a href="/lookup"
           class="btn btn-outline-primary menu-btn">
            신청 내역 조회
        </a>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
