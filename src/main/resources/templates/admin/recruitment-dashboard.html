<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>모집 관리</title>

    <link rel="stylesheet"
          th:href="@{/css/admin/recruitment-dashboard.css}">

</head>

<body>

<div class="page-container">

    <header class="page-header">

        <div>

            <a href="/admin/home"
               class="back-link">

                ← 모집 목록

            </a>

            <h1 class="page-title">
                2026 여름 진로캠프
            </h1>

            <p class="page-subtitle">
                모집중
            </p>

        </div>

    </header>

    <!-- 통계 -->

    <section class="stats-grid">

        <div class="stat-card">
            <div class="stat-value">327</div>
            <div class="stat-label">신청자</div>
        </div>

        <div class="stat-card">
            <div class="stat-value">295</div>
            <div class="stat-label">배정 완료</div>
        </div>

        <div class="stat-card">
            <div class="stat-value">32</div>
            <div class="stat-label">미배정</div>
        </div>

        <div class="stat-card">
            <div class="stat-value">12</div>
            <div class="stat-label">강의 수</div>
        </div>

    </section>

    <!-- 참가자 검색 -->

    <section class="search-card">

        <h2>
            참가자 빠른 조회
        </h2>

        <form>

            <div class="search-wrapper">

                <input
                        type="text"
                        placeholder="휴대전화 번호 입력">

                <button type="submit">
                    검색
                </button>

            </div>

        </form>

    </section>

    <!-- 관리 메뉴 -->

    <section class="menu-grid">

        <a href="/admin/recruitments/1/participants"
           class="menu-card">

            <div class="menu-title">
                참가자 관리
            </div>

            <div class="menu-desc">
                신청 내역 조회 및 수정
            </div>

        </a>

        <a href="/admin/recruitments/1/lectures"
           class="menu-card">

            <div class="menu-title">
                강의 관리
            </div>

            <div class="menu-desc">
                강의 등록 및 수정
            </div>

        </a>

        <a href="/admin/recruitments/1/assignment"
           class="menu-card">

            <div class="menu-title">
                배정 관리
            </div>

            <div class="menu-desc">
                자동 배정 및 결과 확인
            </div>

        </a>

        <a href="/admin/recruitments/1/settings"
           class="menu-card">

            <div class="menu-title">
                모집 설정
            </div>

            <div class="menu-desc">
                모집 수정 및 마감
            </div>

        </a>

    </section>

    <!-- 다운로드 -->

    <section class="download-card">

        <div>

            <div class="download-title">
                배정 결과 다운로드
            </div>

            <div class="download-desc">
                참가자 및 배정 결과 엑셀 파일 생성
            </div>

        </div>

        <a href="/admin/recruitments/1/excel"
           class="download-btn">

            엑셀 다운로드

        </a>

    </section>

</div>

</body>
</html>
