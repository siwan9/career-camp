<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>신청 조회</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .lookup-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 24px;
        }

        .lookup-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .lookup-title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .btn-lookup {
            height: 50px;
            font-size: 1rem;
            font-weight: 600;
        }

        .form-control{
            height: 56px;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-control::placeholder {
            color: #adb5bd;
            opacity: 1;
        }

        @media (max-width: 576px) {
            .lookup-container {
                padding: 16px;
            }

            .lookup-card {
                padding: 20px;
            }

            .lookup-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="lookup-container">

    <div class="lookup-card">

        <h2 class="lookup-title">신청 내역 조회</h2>

        <form>

            <div class="mb-3">
                <label class="form-label">전화번호</label>
                <input
                        type="text"
                        class="form-control form-control-lg"
                        placeholder="전화번호를 입력해주세요">
            </div>

            <div class="mb-4">
                <label class="form-label">비밀번호</label>
                <input
                        type="password"
                        class="form-control form-control-lg"
                        placeholder="비밀번호를 입력해주세요">
            </div>

            <button
                    type="submit"
                    class="btn btn-primary w-100 btn-lookup">
                조회하기
            </button>

        </form>

    </div>

</div>

</body>
</html>
